spring:
  application:
    name: str-xml-pipeline

  docker:
    compose:
      enabled: true
      file: docker-compose.yml
      lifecycle-management: start_only
      activated:
        services:
          - postgres
          - redis
          - kafka
          - kafka-ui
          - floci

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/str_pipeline}
    username: ${SPRING_DATASOURCE_USERNAME:pipeline_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:secure_postgres_pass_130bits}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: StrHikariCP
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:50}
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 15000
      data-source-properties:
        reWriteBatchedInserts: true
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        jdbc:
          batch_size: 1000
          order_inserts: true
          order_updates: true
        order_by:
          default_batch_fetch_size: 64

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:secure_redis_pass_130bits}
      timeout: 2000ms
      connect-timeout: 5000ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 2147483647
        compression.type: lz4
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: ${kafka.consumer.group-id:str-settlement-emission-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        isolation.level: read_committed
        max.poll.records: 10
    listener:
      ack-mode: manual_immediate
      concurrency: 4

kafka:
  consumer:
    group-id: str-settlement-emission-group
  topics:
    batch-emission:
      name: ${KAFKA_TOPIC_BATCH_EMISSION:str.batch.emission}
      partitions: ${KAFKA_TOPIC_BATCH_EMISSION_PARTITIONS:12}
    settlement-return:
      name: ${KAFKA_TOPIC_SETTLEMENT_RETURN:str.settlement.return}
      partitions: ${KAFKA_TOPIC_SETTLEMENT_RETURN_PARTITIONS:4}

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}
    region: ${AWS_REGION:us-east-1}
    access-key-id: ${AWS_ACCESS_KEY_ID:floci_access_key}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:floci_secret_key}
    bucket: ${AWS_S3_BUCKET_NAME:str-xml-storage-bucket}

str:
  xsd:
    path: classpath:xsd/str-settlement-2.0.xsd
    version: "2.0"

jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH}
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}

security:
  rate-limit:
    login-capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
    login-refill-tokens: ${RATE_LIMIT_LOGIN_REFILL_TOKENS:5}
    login-refill-seconds: ${RATE_LIMIT_LOGIN_REFILL_SECONDS:60}
    register-capacity: ${RATE_LIMIT_REGISTER_CAPACITY:3}
    register-refill-tokens: ${RATE_LIMIT_REGISTER_REFILL_TOKENS:3}
    register-refill-seconds: ${RATE_LIMIT_REGISTER_REFILL_SECONDS:3600}
    refresh-capacity: ${RATE_LIMIT_REFRESH_CAPACITY:10}
    refresh-refill-tokens: ${RATE_LIMIT_REFRESH_REFILL_TOKENS:10}
    refresh-refill-seconds: ${RATE_LIMIT_REFRESH_REFILL_SECONDS:60}
    bucket-cache-cleanup-minutes: ${RATE_LIMIT_CACHE_CLEANUP_MINUTES:10}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    tech.strxmlpipeline: DEBUG
    org.springframework.kafka: DEBUG
    org.hibernate.SQL: DEBUG
    com.amazonaws: DEBUG
    software.amazon.awssdk: DEBUG