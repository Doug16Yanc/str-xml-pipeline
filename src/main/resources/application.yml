spring:
  application:
    name: str-xml-pipeline

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/str_settlement_db}
    username: ${SPRING_DATASOURCE_USERNAME:pipeline_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:secure_postgres_pass_130bits}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: StrHikariCP
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:50}
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 15000
      data-source-properties:
        reWriteBatchedInserts: true
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        jdbc:
          batch_size: 1000
          order_inserts: true
          order_updates: true
        order_by:
          default_batch_fetch_size: 64

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:secure_redis_pass_130bits}
      timeout: 2000ms
      connect-timeout: 5000ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 2147483647
        compression.type: lz4

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: str-settlement-emission-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "br.com.xmlemission.domain.model,br.com.xmlemission.infra.entity"

    listener:
      ack-mode: manual_immediate
      concurrency: 4

logging:
  level:
    root: INFO
    br.com.xmlemission: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT}
    region: ${AWS_REGION}
    access-key-id: ${AWS_ACCESS_KEY_ID}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY}
    bucket-name: ${AWS_S3_BUCKET_NAME}

security:
  jwt:
    secret: ${JWT_SECRET:super_secure_and_very_long_jwt_secret_key_for_signature_verification_32_bytes_min}
    expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized